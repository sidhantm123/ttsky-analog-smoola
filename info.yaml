# Tiny Tapeout project information
project:
  title:        "emgADC"      # Project title
  author:       "Sidhant Moola"      # Your name
  discord:      "coolgamr"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "mixed-signal EMG front end with 30Hz HPF, 500Hz LPF, 6-bit SAR ADC, MUAP detector and counter"      # One line description of what your project does
  language:     "Analog" # other examples include Verilog, Amaranth, VHDL, etc
  clock_hz:     20000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values for analog projects: 1x2, 2x2

  # How many analog pins does your project use?
  analog_pins: 2        # Valid values: 0 to 6
  uses_3v3: false       # Set to true if your project uses 3.3V (VAPWR) in addition to 1.8V (VDPWR)

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_sidhantm123_neural_adc"

  # List your project's source files here. Source files must be in ./src and you must list each source file separately, one per line:
  source_files:
    - "project.v"
    - "digital_top.v"
    - "sar_fsm.v"
    - "threshold_det.v"
    - "refractory_ctr.v"
    - "spike_counter.v"
    - "output_mux.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "HPF enable (30 Hz high-pass filter on/off)"
  ui[1]: "LPF enable (500 Hz low-pass filter on/off)"
  ui[2]: "Spike threshold bit 0 (LSB)"
  ui[3]: "Spike threshold bit 1"
  ui[4]: "Spike threshold bit 2"
  ui[5]: "Spike threshold bit 3"
  ui[6]: "Spike threshold bit 4"
  ui[7]: "Spike threshold bit 5 (MSB)"

  # Outputs
  uo[0]: "ADC/spike count output bit 0 (LSB)"
  uo[1]: "ADC/spike count output bit 1"
  uo[2]: "ADC/spike count output bit 2"
  uo[3]: "ADC/spike count output bit 3"
  uo[4]: "ADC/spike count output bit 4"
  uo[5]: "ADC/spike count output bit 5"
  uo[6]: "ADC/spike count output bit 6"
  uo[7]: "ADC/spike count output bit 7"

  # Bidirectional pins
  uio[0]: "Mode select (0=raw ADC output, 1=spike count)"
  uio[1]: "Spike event pulse (high for 1 clock on each spike)"
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

  # Analog pins
  ua[0]: "Analog EMG signal input (pre-amplified)"
  ua[1]: "Reference voltage (Vref)"
  ua[2]: ""
  ua[3]: ""
  ua[4]: ""
  ua[5]: ""

# Do not change!
yaml_version: 6
